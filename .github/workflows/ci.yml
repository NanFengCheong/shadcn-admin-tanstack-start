name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  install-lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint the code
        run: bun run lint

      # - name: Analyze unused files and dependencies
      #   run: bun run knip

      - name: Install browsers
        run: bun run test:browser:install

      - name: Run tests
        run: bun run test

      - name: Build the project
        run: bun run build
